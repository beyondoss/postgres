# Beyond-managed Postgres configuration.
# Overwritten on every boot by beyond-pg supervisor. Do not edit.
# User overrides belong in conf.d/99-user.conf (never touched by the image).

# ---------------------------------------------------------------------------
# Networking — clients reach Postgres through PgBouncer (5432); Postgres itself
# listens on all interfaces so replication consumers (replicas, WAL sink, CDC)
# can stream from it over the private overlay. This is NOT a public exposure:
# the VPC overlay is private + mTLS-tunneled, and pg_hba requires scram for
# every host connection (replication included). Replication has no loopback-only
# remote path, so '*' is required for the primary/replica tiers.
# ---------------------------------------------------------------------------
listen_addresses = '*'
port = 5433
unix_socket_directories = '/var/run/postgresql'
# Explicit path so postgres uses /etc even when started with -D PGDATA
hba_file = '/etc/postgresql/18/main/pg_hba.conf'

# ---------------------------------------------------------------------------
# TLS — `ssl_cert_file` / `ssl_key_file` here are the self-signed fallback
# path. At boot, `beyond-pg` writes `conf.d/06-tls.conf` with the resolved
# cert source (platform / user-managed / self-signed), which overrides these
# via alpha order. See DECISIONS.md I-004 and src/tls.rs.
# ---------------------------------------------------------------------------
ssl = on
ssl_cert_file = '/var/lib/postgresql/18/main/beyond/server.crt'
ssl_key_file = '/var/lib/postgresql/18/main/beyond/server.key'
ssl_min_protocol_version = 'TLSv1.3'

# ---------------------------------------------------------------------------
# Storage cost model — GlideFS is local-SSD-backed, not spinning disk
# ---------------------------------------------------------------------------
random_page_cost = 1.1
effective_io_concurrency = 200

# ---------------------------------------------------------------------------
# Logging — stderr only; beyond-pg supervisor forwards lines over vsock
# ---------------------------------------------------------------------------
log_destination = 'stderr'
logging_collector = off
log_line_prefix = '%m [%p] %q[%a] db=%d,user=%u,client=%h '
log_min_duration_statement = 1000
log_statement = 'ddl'
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 10MB

# ---------------------------------------------------------------------------
# Statistics and observability extensions
# ---------------------------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements,auto_explain,pg_cron,beyond_auth,beyond_queue'
pg_stat_statements.max = 10000
pg_stat_statements.track = all
auto_explain.log_min_duration = 1000
auto_explain.log_analyze = on
auto_explain.log_buffers = on

# ---------------------------------------------------------------------------
# pg_cron — must be set at preload time
# ---------------------------------------------------------------------------
cron.database_name = 'postgres'
cron.use_background_workers = on

# ---------------------------------------------------------------------------
# Replication readiness — all of these require a restart to change later;
# paid upfront so adding replicas never bounces production (DECISIONS.md P-001)
# ---------------------------------------------------------------------------
wal_level = logical
max_wal_senders = 10
max_replication_slots = 10
hot_standby = on
wal_keep_size = 1GB
synchronous_commit = on

# ---------------------------------------------------------------------------
# WAL and checkpoints — tuned for GlideFS 128KB blocks / 5s flush window
# ---------------------------------------------------------------------------
# full_page_writes MUST stay on: GlideFS is CoW toward S3 but OVERWRITES IN PLACE
# on the local-SSD write-back cache, so an 8 KiB page write into a present 128 KiB
# block can tear on power loss. (The ZFS "FPW off on CoW" trick does NOT transfer.)
full_page_writes = on
wal_sync_method = fdatasync
# Keep lz4, do NOT switch to zstd: GlideFS already LZ4-compresses every block at
# flush, so pre-zstd'ing WAL yields high-entropy blocks it can't compress further.
# Measured: zstd = +12.5% S3 write bytes at equal work (bench/glidefs-pg/RESULTS.md).
wal_compression = lz4
# Fewer/larger checkpoints = fewer full-page-image bursts = far less WAL→S3.
# Measured on PG18-on-GlideFS (bench/glidefs-pg, fixed 300k txns): a frequent vs
# rare checkpoint cadence wrote 2.9x more S3 bytes (635 vs 216 MB) AND ran slower.
# 30min halves the checkpoint rate vs 15min; recovery stays bounded by max_wal_size.
checkpoint_timeout = 30min
max_wal_size = 8GB
min_wal_size = 1GB
checkpoint_completion_target = 0.9
bgwriter_delay = 100ms
bgwriter_lru_maxpages = 1000

# ---------------------------------------------------------------------------
# Archiving — OFF. WAL durability + PITR ride the WAL sink (beyond-pg-sink), a
# streaming-replication consumer whose replication slot retains WAL until it's
# consumed; the sink serves segments back over HTTP for PITR restore_command.
# No archive_command / object-store push path.
# ---------------------------------------------------------------------------
archive_mode = off

# ---------------------------------------------------------------------------
# Defensive timeouts
# ---------------------------------------------------------------------------
idle_in_transaction_session_timeout = 5min
lock_timeout = 30s

# ---------------------------------------------------------------------------
# Connection liveness — prevents stale pooler→PG connections from accumulating
# ---------------------------------------------------------------------------
tcp_keepalives_idle = 60
tcp_keepalives_interval = 10
tcp_keepalives_count = 6

# ---------------------------------------------------------------------------
# Autovacuum — tightened for write-heavy SaaS workloads
# ---------------------------------------------------------------------------
autovacuum_vacuum_scale_factor = 0.1
autovacuum_naptime = 30s
# Decouple autovacuum memory from maintenance_work_mem. Autovacuum workers are
# internally capped at ~1 GB by the PG source regardless of maintenance_work_mem;
# setting this explicitly allows maintenance_work_mem to be raised for large
# index builds without inflating the autovacuum footprint (3 workers × 1 GB = 3 GB max).
# Ref: Robert Haas "How Much maintenance_work_mem Do I Need?" (2019)
autovacuum_work_mem = 1GB

# ---------------------------------------------------------------------------
# Locking headroom for pg_partman partition management
# ---------------------------------------------------------------------------
max_locks_per_transaction = 256

# ---------------------------------------------------------------------------
# User overrides — higher number wins; never touched by the image
# ---------------------------------------------------------------------------
include_dir = '/var/lib/postgresql/18/main/conf.d'
