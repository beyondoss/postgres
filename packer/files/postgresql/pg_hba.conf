# Beyond Postgres host-based authentication.
# Overwritten on every boot by beyond-pg supervisor. Do not edit.
# See DESIGN.md "Authentication" for rationale.

# TYPE  DATABASE  USER  ADDRESS        METHOD
# Co-located pgbouncer: connects over the unix socket as the `pgbouncer`
# auth_user (PASSWORD NULL) to run auth_query. It runs as the `postgres` OS user,
# so `peer` (which maps OS name -> DB name) rejects the `pgbouncer` DB user with
# "Peer authentication failed". Trust is safe here: unix socket only, same VM,
# and the role exists solely for the auth_query lookup. MUST precede the
# catch-all `local all all peer` (pg_hba is first-match).
local   all       pgbouncer            trust

# Unix socket: peer auth for local admin and bootstrap scripts
local   all       all                  peer

# Loopback: scram-sha-256 everywhere — no trust, no md5 (legacy)
host    all       all   127.0.0.1/32   scram-sha-256
host    all       all   ::1/128        scram-sha-256

# All other connections (Beyond tunnel does mTLS; PG-level TLS off in MVP)
host    all       all   all            scram-sha-256

# Internal WAL forwarder (beyond-pg supervisor process, same VM, loopback only).
# Connects as postgres superuser via TCP; trust is safe — loopback is VM-local.
host    replication    postgres      127.0.0.1/32    trust

# External replication consumers (beyond-pg-cdc, pg_receivewal).
host    replication    replicator    all             scram-sha-256
