# PgBouncer configuration for Beyond Postgres.
# User-facing port: 5432 (transaction pooling — use for app traffic)
# Direct Postgres:  5433 (DDL, pg_dump, LISTEN/NOTIFY, advisory locks)

[databases]
* = host=/var/run/postgresql port=5433

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432

# Auth via auth_query so beyond-pg doesn't need to manage a static userlist.txt.
# The pgbouncer role and get_auth() function are created in post_start.
auth_type = scram-sha-256
auth_user = pgbouncer
auth_query = SELECT username, password FROM pgbouncer.get_auth($1)

# Transaction pooling — the default for managed Postgres
pool_mode = transaction
default_pool_size = 20
max_client_conn = 100

# Connection hygiene
server_idle_timeout = 600
server_lifetime = 3600

# Protocol-level prepared statement support (PgBouncer 1.21+)
max_prepared_statements = 200

# Parameters that vary by client and don't affect server state
ignore_startup_parameters = extra_float_digits,search_path

logfile =
pidfile =
