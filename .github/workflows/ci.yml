name: tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get install -y libreadline-dev uuid-dev
      - uses: jdx/mise-action@v4
      - name: test
        run: mise run "test:*"
