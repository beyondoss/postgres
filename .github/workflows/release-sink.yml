name: beyond-pg-sink release
on:
  release:
    types: [published]
jobs:
  build:
    # `release: published` fires for EVERY release in this repo, including the
    # `server/v*` ones — which have nothing to do with the sink. Without this
    # guard the sink build runs on a server release and then fails trying to
    # publish sink binaries against a server tag. Sink releases are `sink/v*`.
    if: startsWith(github.ref_name, 'sink/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get install -y libreadline-dev uuid-dev
      - uses: jdx/mise-action@v4
      - name: Cross-compile for Linux amd64
        run: cross build --release -p beyond-pg-sink --target x86_64-unknown-linux-gnu
      - name: Cross-compile for Linux arm64
        run: cross build --release -p beyond-pg-sink --target aarch64-unknown-linux-gnu
      - name: Rename binaries
        run: |
          # Tags are `sink/vX.Y.Z`, so ref_name carries a slash. Interpolating it
          # straight into a filename makes the shell read everything before the
          # slash as a directory ("beyond-pg-sink-sink/v0.1.0-linux-amd64"), and
          # `cp` fails with "No such file or directory". Use the bare version.
          VERSION="${GITHUB_REF_NAME##*/}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          cp target/x86_64-unknown-linux-gnu/release/beyond-pg-sink "beyond-pg-sink-${VERSION}-linux-amd64"
          cp target/aarch64-unknown-linux-gnu/release/beyond-pg-sink "beyond-pg-sink-${VERSION}-linux-arm64"
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Asset names use the bare version; the release is still addressed by
          # the full tag.
          gh release upload "$GITHUB_REF_NAME" \
            "beyond-pg-sink-${VERSION}-linux-amd64" \
            "beyond-pg-sink-${VERSION}-linux-arm64"
