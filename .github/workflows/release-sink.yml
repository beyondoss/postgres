name: beyond-pg-sink release
on:
  release:
    types: [published]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get install -y libreadline-dev uuid-dev
      - uses: jdx/mise-action@v4
      - name: Cross-compile for Linux amd64
        run: cross build --release -p beyond-pg-sink --target x86_64-unknown-linux-gnu
      - name: Cross-compile for Linux arm64
        run: cross build --release -p beyond-pg-sink --target aarch64-unknown-linux-gnu
      - name: Rename binaries
        run: |
          cp target/x86_64-unknown-linux-gnu/release/beyond-pg-sink beyond-pg-sink-${{ github.ref_name }}-linux-amd64
          cp target/aarch64-unknown-linux-gnu/release/beyond-pg-sink beyond-pg-sink-${{ github.ref_name }}-linux-arm64
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.ref_name }} \
            beyond-pg-sink-${{ github.ref_name }}-linux-amd64 \
            beyond-pg-sink-${{ github.ref_name }}-linux-arm64
